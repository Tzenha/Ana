<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dia & Noite</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:Arial,sans-serif;}
.world{display:flex;width:100%;height:100vh;position:relative;}
.side{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}

.day{background:linear-gradient(180deg,#3fa8e0 0%,#87CEEB 35%,#b8e4f7 65%,#a8dba8 100%);}
.night{background:linear-gradient(180deg,#020818 0%,#080830 40%,#0f0f40 70%,#081408 100%);}

.sun{position:absolute;top:40px;right:80px;width:90px;height:90px;background:radial-gradient(circle,#fff7aa,#FFD700);border-radius:50%;box-shadow:0 0 60px #FFD700,0 0 120px #FFA50077;animation:sun-pulse 3s ease-in-out infinite;z-index:1;}
@keyframes sun-pulse{0%,100%{box-shadow:0 0 60px #FFD700,0 0 120px #FFA50077;}50%{box-shadow:0 0 90px #FFD700,0 0 160px #FFA500aa;}}

.moon{position:absolute;top:35px;left:70px;width:70px;height:70px;background:radial-gradient(circle at 30% 50%,#fffef0 30%,#e8e0b0 60%,#080830 72%);border-radius:50%;box-shadow:0 0 30px rgba(255,253,200,0.6);}

.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 2s ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.1;transform:scale(0.6);}}

.cloud{position:absolute;border-radius:50px;background:rgba(255,255,255,0.85);}

.ground-day{position:absolute;bottom:0;left:0;right:0;height:110px;background:linear-gradient(180deg,#5cb85c,#2d7a2d);}
.ground-night{position:absolute;bottom:0;left:0;right:0;height:110px;background:linear-gradient(180deg,#0a1f0a,#050d05);}

.divider{position:absolute;left:50%;top:0;bottom:0;width:5px;background:linear-gradient(180deg,#FFD700 0%,#c084fc 50%,#312e81 100%);z-index:30;transform:translateX(-50%);box-shadow:0 0 14px rgba(200,150,255,0.5);}

.card-zone{position:relative;display:flex;align-items:center;justify-content:center;}
.day .card-zone{margin-right:30px;}
.night .card-zone{margin-left:30px;}

.card-wrap{position:relative;width:230px;height:150px;}

/* BIG BOX — z:5, fully opaque on both sides */
.big-box{
  width:230px;height:150px;
  border-radius:24px;
  display:flex;align-items:center;justify-content:center;
  text-align:center;font-size:18px;font-weight:800;line-height:1.6;
  cursor:pointer;position:relative;z-index:5;
  transition:box-shadow 0.3s;user-select:none;overflow:visible;
}
.day .big-box{background:#ffffff;color:#c0500a;border:4px solid #f39c12;box-shadow:0 8px 32px rgba(243,156,18,0.4);}
/* FIXED: fully opaque so boy stays hidden below */
.night .big-box{background:#07073a;color:#b0b8f8;border:4px solid #6c7ae0;box-shadow:0 8px 32px rgba(108,122,224,0.4);}

/* CHARACTER container */
.char-clip{
  position:absolute;
  left:50%;transform:translateX(-50%);
  width:180px;
  bottom:0;
  height:600px;
  z-index:4;
  pointer-events:none;
  overflow:hidden;
}

.char-inner{
  position:absolute;
  bottom:0;
  left:0;width:180px;
  transition:transform 0.6s cubic-bezier(0.34,1.5,0.64,1);
}

@keyframes eye-bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
.char-inner.idle{animation:eye-bob 2.8s ease-in-out infinite;}
.char-inner.risen{animation:none;}

/* BARS */
.bars-wrap{position:absolute;top:16px;display:flex;flex-direction:column;gap:10px;z-index:20;pointer-events:none;}
.day .bars-wrap{left:calc(100% + 8px);}
.night .bars-wrap{right:calc(100% + 8px);align-items:flex-end;}

.bar-item{
  height:52px;border-radius:14px;
  display:flex;align-items:center;padding:0 22px;
  font-size:15px;font-weight:700;white-space:nowrap;cursor:pointer;
  transform:scaleX(0);opacity:0;pointer-events:none;
  transition:transform 0.45s cubic-bezier(0.34,1.5,0.64,1),opacity 0.3s ease;
}
.day .bar-item{background:#fff;color:#b03000;border-left:5px solid #e74c3c;transform-origin:left center;box-shadow:0 4px 16px rgba(0,0,0,0.13);}
.night .bar-item{background:#0f0f50;color:#d0d8ff;border-right:5px solid #7986cb;transform-origin:right center;box-shadow:0 4px 16px rgba(0,0,0,0.5);}
.bar-item:nth-child(1){transition-delay:0s;}
.bar-item:nth-child(2){transition-delay:0.07s;}
.bar-item:nth-child(3){transition-delay:0.14s;}
.bar-item:nth-child(4){transition-delay:0.21s;}
.bar-item:nth-child(5){transition-delay:0.28s;}
.bar-item:nth-child(6){transition-delay:0.35s;}
.bar-item:nth-child(7){transition-delay:0.42s;}
.bar-item:nth-child(8){transition-delay:0.49s;}
.bars-open .bar-item{transform:scaleX(1);opacity:1;pointer-events:all;}
.bar-item:hover{filter:brightness(1.12);}
</style>
</head>

<script>
function initChar(innerId, idleArmsId, upArmsId, boxId, barsId) {
  const inner = document.getElementById(innerId);
  const idleArms = document.getElementById(idleArmsId);
  const upArms = document.getElementById(upArmsId);
  const box = document.getElementById(boxId);
  const bars = document.getElementById(barsId);
  let barsTimer;

  const idleOffset = 0;
  inner.style.transform = 'translateY(' + idleOffset + 'px)';
  upArms.style.opacity = '0';

  // Aplicar transition nos braços idle para animação suave
  idleArms.style.transition = 'transform 0.5s cubic-bezier(0.34,1.2,0.64,1), opacity 0.35s ease';
  idleArms.style.transformBox = 'fill-box';
  idleArms.style.transformOrigin = 'center top';

  function rise() {
    inner.classList.remove('idle');
    inner.classList.add('risen');
    const riseAmount = (innerId === 'girl-inner') ? -90 : -95;
    inner.style.transform = 'translateY(' + (idleOffset + riseAmount) + 'px)';
    // Braços sobem verticalmente — levantamento natural
    idleArms.style.transform = 'translateY(-60px)';
    idleArms.style.opacity = '0';
    upArms.style.transition = 'opacity 0.3s 0.15s ease';
    upArms.style.opacity = '1';
    clearTimeout(barsTimer);
    bars.classList.add('bars-open');
  }

  function sink() {
    inner.classList.remove('risen');
    inner.style.transform = 'translateY(' + idleOffset + 'px)';
    idleArms.style.transform = 'rotate(0deg) translateY(0px)';
    idleArms.style.opacity = '1';
    upArms.style.transition = 'opacity 0.2s ease';
    upArms.style.opacity = '0';
    setTimeout(() => inner.classList.add('idle'), 650);
    barsTimer = setTimeout(() => {
      if (!bars.matches(':hover')) bars.classList.remove('bars-open');
    }, 160);
  }

  box.addEventListener('mouseenter', rise);
  box.addEventListener('mouseleave', sink);
  bars.addEventListener('mouseenter', () => clearTimeout(barsTimer));
  bars.addEventListener('mouseleave', () => { barsTimer = setTimeout(() => bars.classList.remove('bars-open'), 160); });
}

initChar('girl-inner','girl-idle-arms','girl-up-arms','day-box','day-bars');
initChar('boy-inner','boy-idle-arms','boy-up-arms','night-box','night-bars');
</script>
